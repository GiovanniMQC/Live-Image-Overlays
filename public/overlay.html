<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>OBS Overlay - Live Image</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Fundo transparente para o OBS */
            background-color: transparent;
            overflow: hidden;
            width: 1920px;
            height: 1080px;
            position: relative;
        }

        #interaction-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            font-size: 32px;
            font-family: Arial, sans-serif;
            z-index: 999999;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Solução para artefatos de renderização (tearing) no OBS/Chromium */
        .media-content {
            display: block !important;
            transform: translateZ(0);
            backface-visibility: hidden;
            will-change: transform;
            image-rendering: crisp-edges;
            clip-path: inset(0.5px);
        }

        .media-crop-wrapper {
            overflow: hidden;
            transform: translateZ(0);
        }
    </style>
</head>
<body>
    <div id="interaction-overlay">🔊 Clique aqui para permitir o áudio</div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // Elementos atualmente no DOM
        const mediaElements = {};
        const mediaState = {};
        let globalAudio = new Audio();

        function applyTransform(id) {
            const media = mediaState[id];
            const container = mediaElements[id];
            if (!container || !media) return;
            
            const sx = media.scaleX !== undefined ? media.scaleX : (media.scale || 1);
            const sy = media.scaleY !== undefined ? media.scaleY : (media.scale || 1);
            const rot = media.rotation || 0;
            
            container.style.transform = `translateZ(0) rotate(${rot}deg) scale(${sx}, ${sy})`;
            
            const wrapperEl = container.querySelector('.media-crop-wrapper');
            const contentEl = container.querySelector('.media-content');
            if (wrapperEl && contentEl) {
                const flipX = media.flipX ? -1 : 1;
                const flipY = media.flipY ? -1 : 1;
                wrapperEl.style.transform = `scale(${flipX}, ${flipY})`;
                
                if (media.type === 'text') {
                    contentEl.style.width = 'max-content';
                    contentEl.style.height = 'max-content';
                    contentEl.style.maxWidth = 'none';
                    contentEl.style.maxHeight = 'none';
                    wrapperEl.style.width = 'max-content';
                    wrapperEl.style.height = 'max-content';
                } else {
                    let baseWidth = parseFloat(contentEl.dataset.baseWidth);
                    let baseHeight = parseFloat(contentEl.dataset.baseHeight);

                    if (!baseWidth || baseWidth < 2) {
                        baseWidth = contentEl.offsetWidth;
                        baseHeight = contentEl.offsetHeight;
                        if (baseWidth > 2) {
                            contentEl.dataset.baseWidth = baseWidth;
                            contentEl.dataset.baseHeight = baseHeight;
                            contentEl.style.width = Math.round(baseWidth) + 'px';
                            contentEl.style.height = Math.round(baseHeight) + 'px';
                            contentEl.style.maxWidth = 'none';
                            contentEl.style.maxHeight = 'none';
                        } else {
                            baseWidth = 100;
                            baseHeight = 100;
                        }
                    }

                    const crop = media.crop || { t: 0, r: 0, b: 0, l: 0 };
                    const cT = Math.round(crop.t);
                    const cR = Math.round(crop.r);
                    const cB = Math.round(crop.b);
                    const cL = Math.round(crop.l);
                    const visibleWidth = Math.round(Math.max(1, baseWidth - cL - cR));
                    const visibleHeight = Math.round(Math.max(1, baseHeight - cT - cB));

                    wrapperEl.style.width = visibleWidth + 'px';
                    wrapperEl.style.height = visibleHeight + 'px';

                    contentEl.style.marginLeft = `-${cL}px`;
                    contentEl.style.marginTop = `-${cT}px`;
                }
            }
        }

        // Ao conectar, pede o estado atual ao servidor para exibir o que já está na tela
        socket.on('connect', () => {
            console.log('Conectado ao servidor de Overlay');
            socket.emit('request_state');
        });

        function playAudioWithState(data) {
            if (data.volume !== undefined) globalAudio.volume = data.volume;

            const playNow = () => {
                try { 
                    if (Math.abs(globalAudio.currentTime - (data.currentTime || 0)) > 0.5) {
                        globalAudio.currentTime = data.currentTime || 0; 
                    }
                } catch(e){}
                globalAudio.play().catch(e => {
                    console.error("Audio Error:", e);
                    // Se o navegador bloquear o autoplay, pede para o usuário clicar
                    if (e.name === 'NotAllowedError') {
                        document.getElementById('interaction-overlay').style.display = 'flex';
                    }
                });
            };
            
            if (data.url) {
                const fullUrl = new URL(data.url, window.location.origin).href;
                if (globalAudio.src !== fullUrl) {
                    globalAudio.pause();
                    globalAudio.src = data.url;
                    globalAudio.load();
                }
            }

            if (!globalAudio.src || globalAudio.src === window.location.href) return;

            if (globalAudio.readyState >= 1) { // HAVE_METADATA
                if (data.playing !== false) playNow();
            } else {
                globalAudio.addEventListener('loadedmetadata', function onLoaded() {
                    globalAudio.removeEventListener('loadedmetadata', onLoaded);
                    if (data.playing !== false) playNow();
                });
            }
        }

        // Ao clicar no overlay de bloqueio, tenta tocar novamente e o esconde
        document.getElementById('interaction-overlay').addEventListener('click', () => {
            document.getElementById('interaction-overlay').style.display = 'none';
            if (globalAudio.src && globalAudio.src !== window.location.href) {
                globalAudio.play().catch(e => console.error(e));
            }
        });

        socket.on('audio:sync', (data) => {
            if (data.volume !== undefined) globalAudio.volume = data.volume;
            if (data.playing) {
                playAudioWithState(data);
            } else {
                if (data.url) {
                    const fullUrl = new URL(data.url, window.location.origin).href;
                    if (globalAudio.src !== fullUrl) {
                        globalAudio.src = data.url;
                        globalAudio.load();
                    }
                }
                globalAudio.pause();
                if (globalAudio.readyState >= 1) {
                    try { globalAudio.currentTime = data.currentTime || 0; } catch(e){}
                }
            }
        });

        socket.on('audio:play', (data) => {
            playAudioWithState(data);
        });

        socket.on('audio:pause', (data) => {
            globalAudio.pause();
            try { globalAudio.currentTime = data.currentTime || 0; } catch(e){}
        });

        socket.on('audio:seek', (data) => {
            try { globalAudio.currentTime = data.currentTime; } catch(e){}
        });

        socket.on('audio:volume', (data) => {
            globalAudio.volume = data.volume;
        });

        socket.on('sync_state', (stateList) => {
            // Limpa elementos atuais no dom
            Object.values(mediaElements).forEach(el => el.remove());
            for(let key in mediaElements) delete mediaElements[key];
            for(let key in mediaState) delete mediaState[key];

            stateList.forEach(data => createOrUpdateMedia(data));
        });

        const pendingRenders = new Set();
        let renderScheduled = false;

        function scheduleRender(id) {
            if (id) pendingRenders.add(id);
            if (!renderScheduled) {
                renderScheduled = true;
                requestAnimationFrame(flushRenders);
            }
        }

        function flushRenders() {
            pendingRenders.forEach(id => {
                const el = mediaElements[id];
                const data = mediaState[id];
                if (el && data) {
                    if (data.x !== undefined) el.style.left = data.x + 'px';
                    if (data.y !== undefined) el.style.top = data.y + 'px';
                    if (data.zIndex !== undefined) el.style.zIndex = data.zIndex;
                    
                    if (data.visible !== undefined) {
                        el.style.display = data.visible ? 'block' : 'none';
                    }
                    if (data.opacity !== undefined && el.firstChild) {
                        el.firstChild.style.opacity = data.opacity;
                    }
                    
                    applyTransform(id);
                }
            });
            pendingRenders.clear();
            renderScheduled = false;
        }

        socket.on('media:create', (data) => {
            createOrUpdateMedia(data);
        });

        socket.on('media:drag_sync', (data) => {
            if (mediaState[data.id]) {
                mediaState[data.id].x = data.x;
                mediaState[data.id].y = data.y;
                scheduleRender(data.id);
            }
        });

        socket.on('media:scale_sync', (data) => {
            if (mediaState[data.id]) {
                mediaState[data.id].scaleX = data.scaleX !== undefined ? data.scaleX : (data.scale || 1);
                mediaState[data.id].scaleY = data.scaleY !== undefined ? data.scaleY : (data.scale || 1);
                scheduleRender(data.id);
            }
        });

        socket.on('media:transform_sync', (data) => {
            if (mediaState[data.id]) {
                mediaState[data.id].rotation = data.rotation;
                mediaState[data.id].flipX = data.flipX;
                mediaState[data.id].flipY = data.flipY;
                if (data.x !== undefined) mediaState[data.id].x = data.x;
                if (data.y !== undefined) mediaState[data.id].y = data.y;
                scheduleRender(data.id);
            }
        });

        socket.on('media:crop_sync', (data) => {
            if (mediaState[data.id]) {
                mediaState[data.id].crop = data.crop;
                scheduleRender(data.id);
            }
        });

        socket.on('media:update_text', (data) => {
            if (mediaState[data.id]) {
                mediaState[data.id].text = data.text;
                const container = mediaElements[data.id];
                if (container) {
                    const textEl = container.querySelector('.media-content');
                    if (textEl) {
                        textEl.innerText = data.text;
                        scheduleRender(data.id);
                    }
                }
            }
        });

        socket.on('media:layer_sync', (data) => {
            if (mediaState[data.id]) {
                mediaState[data.id].zIndex = data.zIndex !== undefined ? data.zIndex : 10;
                scheduleRender(data.id);
            }
        });

        socket.on('media:video_mute', (data) => {
            const el = mediaElements[data.id];
            if (el) {
                const video = el.querySelector('video');
                if (video) video.muted = data.muted;
            }
        });

        socket.on('media:video_seek', (data) => {
            const el = mediaElements[data.id];
            if (el) {
                const video = el.querySelector('video');
                if (video) video.currentTime = data.currentTime;
            }
        });

        socket.on('media:opacity_sync', (data) => {
            if (mediaState[data.id]) {
                mediaState[data.id].opacity = data.opacity;
                scheduleRender(data.id);
            }
        });

        socket.on('media:toggle_visibility', (data) => {
            if (mediaState[data.id]) {
                mediaState[data.id].visible = data.visible;
                scheduleRender(data.id);
            }
        });

        socket.on('media:delete', (data) => {
            const el = mediaElements[data.id];
            if (el) {
                el.remove();
                delete mediaElements[data.id];
            }
        });

        function createOrUpdateMedia(data) {
            mediaState[data.id] = { ...mediaState[data.id], ...data };
            if (mediaElements[data.id]) {
                applyTransform(data.id);
                return;
            }

            // Cria um container (wrapper) idêntico ao que existe no Admin
            const container = document.createElement('div');
            container.id = `media-${data.id}`;
            container.style.position = 'absolute';
            container.style.left = data.x + 'px';
            container.style.top = data.y + 'px';
            container.style.display = data.visible ? 'block' : 'none';
            container.style.transformOrigin = 'top left';
            container.style.zIndex = data.zIndex !== undefined ? data.zIndex : 10;
            container.style.willChange = 'transform, left, top';
            
            let mediaEl;
            if (data.type === 'text') {
                mediaEl = document.createElement('div');
                mediaEl.innerText = data.text;
                mediaEl.style.color = data.color || '#ffffff';
                mediaEl.style.fontSize = '40px';
                mediaEl.style.fontFamily = 'Arial, sans-serif';
                mediaEl.style.fontWeight = 'bold';
                mediaEl.style.textShadow = '2px 2px 4px rgba(0,0,0,0.8)';
                mediaEl.style.whiteSpace = 'pre-wrap';
                mediaEl.classList.add('media-content');
            } else {
                const isVideo = data.url && data.url.split('?')[0].match(/\.(mp4|webm|ogg)$/i);
                if (isVideo) {
                    mediaEl = document.createElement('video');
                    mediaEl.src = data.url;
                    mediaEl.autoplay = true;
                    mediaEl.loop = true;
                    mediaEl.muted = data.muted !== undefined ? data.muted : true;
                    if (data.currentTime) {
                        mediaEl.currentTime = data.currentTime;
                    }
                } else {
                    mediaEl = document.createElement('img');
                    mediaEl.src = data.url;
                }

                // Força via style inline para que o OBS (CEF browser) não ignore
                mediaEl.style.display = 'block';
                mediaEl.style.maxWidth = '500px';
                mediaEl.style.maxHeight = '500px';
                mediaEl.classList.add('media-content');
            }

            mediaEl.style.pointerEvents = 'none';
            mediaEl.style.userSelect = 'none';

            if (data.opacity !== undefined) {
                mediaEl.style.opacity = data.opacity;
            }

            const cropWrapper = document.createElement('div');
            cropWrapper.classList.add('media-crop-wrapper');
            cropWrapper.style.overflow = 'hidden';
            cropWrapper.style.position = 'relative';

            cropWrapper.appendChild(mediaEl);
            container.appendChild(cropWrapper);
            document.body.appendChild(container);
            
            mediaElements[data.id] = container;
            
            if (mediaEl.tagName === 'IMG') {
                mediaEl.onload = () => applyTransform(data.id);
            } else if (mediaEl.tagName === 'VIDEO') {
                mediaEl.onloadedmetadata = () => applyTransform(data.id);
            }
            applyTransform(data.id);
        }

        // Heartbeat: mantem o admin atualizado com o tempo real do vídeo rodando no OBS
        setInterval(() => {
            Object.keys(mediaElements).forEach(id => {
                const el = mediaElements[id];
                const video = el.querySelector('video');
                if (video && !video.paused) {
                    // Envia para o servidor sincronizar os painéis admin caso o navegador tenha pausado o vídeo lá
                    socket.emit('media:video_sync_from_overlay', { id: id, currentTime: video.currentTime });
                }
            });
        }, 2000);
    </script>
</body>
</html>
