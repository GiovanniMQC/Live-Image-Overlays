<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>OBS Overlay - Live Image</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Fundo transparente para o OBS */
            background-color: transparent;
            overflow: hidden;
            width: 1920px;
            height: 1080px;
            position: relative;
        }

        #interaction-overlay {
            display: none;
            position: fixed;
            top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 15px 25px;
            border-radius: 8px;
            border: 2px solid #ffd700;
            font-family: Arial, sans-serif;
            z-index: 999999;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            animation: pulse-notice 2s infinite;
        }

        @keyframes pulse-notice {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }

        /* Solução para artefatos de renderização (tearing) no OBS/Chromium */
        .media-content {
            display: block !important;
            transform: translateZ(0);
            backface-visibility: hidden;
            will-change: transform;
            image-rendering: crisp-edges;
            clip-path: inset(0.5px);
        }

        .media-crop-wrapper {
            overflow: hidden;
            transform: translateZ(0);
        }

        /* TTS Character */
        #tts-character-container {
            position: fixed;
            z-index: 99999;
            pointer-events: none;
            opacity: 0;
            
            /* Posições dinâmicas */
            top: var(--tts-hidden-top, auto);
            bottom: var(--tts-hidden-bottom, -400px);
            left: var(--tts-hidden-left, auto);
            right: var(--tts-hidden-right, 20px);
            transform: var(--tts-hidden-transform, none);

            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #tts-character-container.show {
            top: var(--tts-show-top, auto);
            bottom: var(--tts-show-bottom, 20px);
            left: var(--tts-show-left, auto);
            right: var(--tts-show-right, 20px);
            transform: var(--tts-show-transform, none);
            opacity: 1;
        }
        #tts-character-container img {
            max-height: 300px;
            max-width: 300px;
            object-fit: contain;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
        }

        #tts-subtitle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150%;
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            text-shadow: 
                2px 2px 0 #000, 
                -2px -2px 0 #000, 
                2px -2px 0 #000, 
                -2px 2px 0 #000,
                0px 4px 10px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 10;
        }

        #tts-subtitle span {
            display: inline-block;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.15s ease-out, color 0.15s ease-out;
            margin-right: 8px;
        }

        .tts-word-hidden {
            opacity: 0;
            transform: translateY(20px);
            color: #fff;
        }

        .tts-word-visible {
            opacity: 1;
            transform: translateY(0);
            color: #fff;
        }

        .tts-word-active {
            opacity: 1;
            transform: translateY(0);
            color: var(--tts-active-color, #ffd700);
        }

        /* TTS Animations */
        @keyframes tts-bounce {
            0%, 100% { translate: 0 0; }
            50% { translate: 0 -15px; }
        }
        @keyframes tts-shake {
            0%, 100% { translate: 0 0; rotate: 0deg; }
            25% { translate: -5px 0; rotate: -3deg; }
            75% { translate: 5px 0; rotate: 3deg; }
        }
        @keyframes tts-float {
            0%, 100% { translate: 0 0; }
            50% { translate: 0 -10px; }
        }
        @keyframes tts-stretch {
            0%, 100% { scale: 1 1; }
            50% { scale: 1.15 0.9; }
        }

        .anim-bounce-infinite img { animation: tts-bounce 0.4s infinite; }
        .anim-shake-infinite img { animation: tts-shake 0.15s infinite; }
        .anim-float-infinite img { animation: tts-float 3s infinite ease-in-out; }
        .anim-stretch-infinite img { animation: tts-stretch 0.3s infinite; }

        .anim-bounce-sync img { animation: tts-bounce 0.2s ease-out; }
        .anim-shake-sync img { animation: tts-shake 0.15s ease-in-out; }
        .anim-float-sync img { animation: tts-float 0.4s ease-in-out; }
        .anim-stretch-sync img { animation: tts-stretch 0.15s ease-out; }
    </style>
</head>
<body>
    <div id="interaction-overlay">🔊 Clique aqui para permitir o áudio</div>
    
    <div id="tts-character-container">
        <img id="tts-character-img" src="" alt="Character">
        <div id="tts-subtitle"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // Elementos atualmente no DOM
        const mediaElements = {};
        const mediaState = {};
        let globalAudio = new Audio();

        function applyTransform(id) {
            const media = mediaState[id];
            const container = mediaElements[id];
            if (!container || !media) return;
            
            const sx = media.scaleX !== undefined ? media.scaleX : (media.scale || 1);
            const sy = media.scaleY !== undefined ? media.scaleY : (media.scale || 1);
            const rot = media.rotation || 0;
            
            container.style.transform = `translateZ(0) rotate(${rot}deg) scale(${sx}, ${sy})`;
            
            const wrapperEl = container.querySelector('.media-crop-wrapper');
            const contentEl = container.querySelector('.media-content');
            if (wrapperEl && contentEl) {
                const flipX = media.flipX ? -1 : 1;
                const flipY = media.flipY ? -1 : 1;
                wrapperEl.style.transform = `scale(${flipX}, ${flipY})`;
                
                if (media.type === 'text') {
                    contentEl.style.width = 'max-content';
                    contentEl.style.height = 'max-content';
                    contentEl.style.maxWidth = 'none';
                    contentEl.style.maxHeight = 'none';
                    wrapperEl.style.width = 'max-content';
                    wrapperEl.style.height = 'max-content';
                } else {
                    let baseWidth = parseFloat(contentEl.dataset.baseWidth);
                    let baseHeight = parseFloat(contentEl.dataset.baseHeight);

                    if (!baseWidth || baseWidth < 2) {
                        baseWidth = contentEl.offsetWidth;
                        baseHeight = contentEl.offsetHeight;
                        if (baseWidth > 2) {
                            contentEl.dataset.baseWidth = baseWidth;
                            contentEl.dataset.baseHeight = baseHeight;
                            contentEl.style.width = Math.round(baseWidth) + 'px';
                            contentEl.style.height = Math.round(baseHeight) + 'px';
                            contentEl.style.maxWidth = 'none';
                            contentEl.style.maxHeight = 'none';
                        } else {
                            baseWidth = 100;
                            baseHeight = 100;
                        }
                    }

                    const crop = media.crop || { t: 0, r: 0, b: 0, l: 0 };
                    const cT = Math.round(crop.t);
                    const cR = Math.round(crop.r);
                    const cB = Math.round(crop.b);
                    const cL = Math.round(crop.l);
                    const visibleWidth = Math.round(Math.max(1, baseWidth - cL - cR));
                    const visibleHeight = Math.round(Math.max(1, baseHeight - cT - cB));

                    wrapperEl.style.width = visibleWidth + 'px';
                    wrapperEl.style.height = visibleHeight + 'px';

                    contentEl.style.marginLeft = `-${cL}px`;
                    contentEl.style.marginTop = `-${cT}px`;
                }
            }
        }

        // Ao conectar, pede o estado atual ao servidor para exibir o que já está na tela
        socket.on('connect', () => {
            console.log('Conectado ao servidor de Overlay');
            socket.emit('request_state');
        });

        function playAudioWithState(data) {
            if (data.volume !== undefined) {
                const mult = data.volumeMult !== undefined ? data.volumeMult : 1;
                globalAudio.volume = Math.min(1, data.volume * mult);
            }
            if (data.trimEnd) {
                globalAudio.dataset.trimEnd = data.trimEnd;
            } else {
                globalAudio.dataset.trimEnd = '';
            }

            const playNow = () => {
                try { 
                    if (Math.abs(globalAudio.currentTime - (data.currentTime || 0)) > 0.5) {
                        globalAudio.currentTime = data.currentTime || 0; 
                    }
                } catch(e){}
                globalAudio.play().catch(e => {
                    console.error("Audio Error:", e);
                    // Se o navegador bloquear o autoplay, pede para o usuário clicar
                    if (e.name === 'NotAllowedError') {
                        document.getElementById('interaction-overlay').style.display = 'flex';
                    }
                });
            };
            
            if (data.url) {
                const fullUrl = new URL(data.url, window.location.origin).href;
                if (globalAudio.src !== fullUrl) {
                    globalAudio.pause();
                    globalAudio.src = data.url;
                    globalAudio.load();
                }
            }

            if (!globalAudio.src || globalAudio.src === window.location.href) return;

            if (globalAudio.readyState >= 1) { // HAVE_METADATA
                if (data.playing !== false) playNow();
            } else {
                globalAudio.addEventListener('loadedmetadata', function onLoaded() {
                    globalAudio.removeEventListener('loadedmetadata', onLoaded);
                    if (data.playing !== false) playNow();
                });
            }
        }

        // Ao clicar no overlay de bloqueio, tenta tocar novamente e o esconde
        document.getElementById('interaction-overlay').addEventListener('click', () => {
            document.getElementById('interaction-overlay').style.display = 'none';
            if (globalAudio.src && globalAudio.src !== window.location.href) {
                globalAudio.play().catch(e => console.error(e));
            }
            // Tenta dar play em todos os vídeos que possam estar pausados por falta de interação
            Object.values(mediaElements).forEach(container => {
                const video = container.querySelector('video');
                if (video && video.paused) {
                    video.play().catch(e => console.error(e));
                }
            });
        });

        socket.on('audio:sync', (data) => {
            if (data.volume !== undefined) globalAudio.volume = data.volume;
            if (data.playing) {
                playAudioWithState(data);
            } else {
                if (data.url) {
                    const fullUrl = new URL(data.url, window.location.origin).href;
                    if (globalAudio.src !== fullUrl) {
                        globalAudio.src = data.url;
                        globalAudio.load();
                    }
                }
                globalAudio.pause();
                if (globalAudio.readyState >= 1) {
                    try { globalAudio.currentTime = data.currentTime || 0; } catch(e){}
                }
            }
        });

        socket.on('audio:play', (data) => {
            playAudioWithState(data);
        });

        socket.on('audio:pause', (data) => {
            globalAudio.pause();
            try { globalAudio.currentTime = data.currentTime || 0; } catch(e){}
        });

        socket.on('audio:seek', (data) => {
            try { globalAudio.currentTime = data.currentTime; } catch(e){}
        });

        globalAudio.addEventListener('ended', () => {
            socket.emit('audio:pause', { currentTime: 0 });
        });

        globalAudio.addEventListener('timeupdate', () => {
            if (globalAudio.dataset.trimEnd) {
                const trimEnd = parseFloat(globalAudio.dataset.trimEnd);
                if (globalAudio.currentTime >= trimEnd) {
                    globalAudio.dataset.trimEnd = '';
                    globalAudio.pause();
                    socket.emit('audio:pause', { currentTime: 0 });
                }
            }
        });

        socket.on('audio:volume', (data) => {
            const mult = data.volumeMult !== undefined ? data.volumeMult : 1;
            globalAudio.volume = Math.min(1, data.volume * mult);
        });

        socket.on('sync_state', (stateList) => {
            // Limpa elementos atuais no dom
            Object.values(mediaElements).forEach(el => el.remove());
            for(let key in mediaElements) delete mediaElements[key];
            for(let key in mediaState) delete mediaState[key];

            stateList.forEach(data => createOrUpdateMedia(data));
        });

        const pendingRenders = new Set();
        let renderScheduled = false;

        function scheduleRender(id) {
            if (id) pendingRenders.add(id);
            if (!renderScheduled) {
                renderScheduled = true;
                requestAnimationFrame(flushRenders);
            }
        }

        function flushRenders() {
            pendingRenders.forEach(id => {
                const el = mediaElements[id];
                const data = mediaState[id];
                if (el && data) {
                    if (data.x !== undefined) el.style.left = data.x + 'px';
                    if (data.y !== undefined) el.style.top = data.y + 'px';
                    if (data.zIndex !== undefined) el.style.zIndex = data.zIndex;
                    
                    if (data.visible !== undefined) {
                        el.style.display = data.visible ? 'block' : 'none';
                    }
                    if (data.opacity !== undefined && el.firstChild) {
                        el.firstChild.style.opacity = data.opacity;
                    }
                    
                    applyTransform(id);
                }
            });
            pendingRenders.clear();
            renderScheduled = false;
        }

        socket.on('media:create', (data) => {
            createOrUpdateMedia(data);
        });

        socket.on('media:drag_sync', (data) => {
            if (mediaState[data.id]) {
                mediaState[data.id].x = data.x;
                mediaState[data.id].y = data.y;
                scheduleRender(data.id);
            }
        });

        socket.on('media:scale_sync', (data) => {
            if (mediaState[data.id]) {
                mediaState[data.id].scaleX = data.scaleX !== undefined ? data.scaleX : (data.scale || 1);
                mediaState[data.id].scaleY = data.scaleY !== undefined ? data.scaleY : (data.scale || 1);
                scheduleRender(data.id);
            }
        });

        socket.on('media:transform_sync', (data) => {
            if (mediaState[data.id]) {
                mediaState[data.id].rotation = data.rotation;
                mediaState[data.id].flipX = data.flipX;
                mediaState[data.id].flipY = data.flipY;
                if (data.x !== undefined) mediaState[data.id].x = data.x;
                if (data.y !== undefined) mediaState[data.id].y = data.y;
                scheduleRender(data.id);
            }
        });

        socket.on('media:crop_sync', (data) => {
            if (mediaState[data.id]) {
                mediaState[data.id].crop = data.crop;
                scheduleRender(data.id);
            }
        });

        socket.on('media:update_text', (data) => {
            if (mediaState[data.id]) {
                mediaState[data.id].text = data.text;
                const container = mediaElements[data.id];
                if (container) {
                    const textEl = container.querySelector('.media-content');
                    if (textEl) {
                        textEl.innerText = data.text;
                        scheduleRender(data.id);
                    }
                }
            }
        });

        socket.on('media:layer_sync', (data) => {
            if (mediaState[data.id]) {
                mediaState[data.id].zIndex = data.zIndex !== undefined ? data.zIndex : 10;
                scheduleRender(data.id);
            }
        });

        socket.on('media:video_mute', (data) => {
            const el = mediaElements[data.id];
            if (el) {
                const video = el.querySelector('video');
                if (video) {
                    video.muted = data.muted;
                    if (!data.muted && video.paused) {
                        let playPromise = video.play();
                        if (playPromise !== undefined) {
                            playPromise.catch(e => {
                                if (e.name === 'NotAllowedError') {
                                    document.getElementById('interaction-overlay').style.display = 'flex';
                                }
                            });
                        }
                    }
                }
            }
        });

        socket.on('media:video_volume', (data) => {
            const el = mediaElements[data.id];
            if (el) {
                const video = el.querySelector('video');
                if (video) video.volume = data.volume;
            }
        });

        socket.on('media:video_seek', (data) => {
            const el = mediaElements[data.id];
            if (el) {
                const video = el.querySelector('video');
                if (video) video.currentTime = data.currentTime;
            }
        });

        socket.on('media:opacity_sync', (data) => {
            if (mediaState[data.id]) {
                mediaState[data.id].opacity = data.opacity;
                scheduleRender(data.id);
            }
        });

        socket.on('media:toggle_visibility', (data) => {
            if (mediaState[data.id]) {
                mediaState[data.id].visible = data.visible;
                scheduleRender(data.id);
            }
        });

        socket.on('media:delete', (data) => {
            const el = mediaElements[data.id];
            if (el) {
                el.remove();
                delete mediaElements[data.id];
            }
        });

        function createOrUpdateMedia(data) {
            mediaState[data.id] = { ...mediaState[data.id], ...data };
            if (mediaElements[data.id]) {
                applyTransform(data.id);
                return;
            }

            // Cria um container (wrapper) idêntico ao que existe no Admin
            const container = document.createElement('div');
            container.id = `media-${data.id}`;
            container.style.position = 'absolute';
            container.style.left = data.x + 'px';
            container.style.top = data.y + 'px';
            container.style.display = data.visible ? 'block' : 'none';
            container.style.transformOrigin = 'top left';
            container.style.zIndex = data.zIndex !== undefined ? data.zIndex : 10;
            container.style.willChange = 'transform, left, top';
            
            let mediaEl;
            if (data.type === 'text') {
                mediaEl = document.createElement('div');
                mediaEl.innerText = data.text;
                mediaEl.style.color = data.color || '#ffffff';
                mediaEl.style.fontSize = '40px';
                mediaEl.style.fontFamily = 'Arial, sans-serif';
                mediaEl.style.fontWeight = 'bold';
                mediaEl.style.textShadow = '2px 2px 4px rgba(0,0,0,0.8)';
                mediaEl.style.whiteSpace = 'pre-wrap';
                mediaEl.classList.add('media-content');
            } else {
                const isVideo = data.url && data.url.split('?')[0].match(/\.(mp4|webm|ogg)$/i);
                if (isVideo) {
                    mediaEl = document.createElement('video');
                    mediaEl.src = data.url;
                    mediaEl.autoplay = true;
                    mediaEl.loop = true;
                    mediaEl.muted = data.muted !== undefined ? data.muted : true;
                    if (data.volume !== undefined) mediaEl.volume = data.volume;
                    if (data.currentTime) {
                        mediaEl.currentTime = data.currentTime;
                    }
                    
                    // Tentativa explícita de play para pegar bloqueio do navegador
                    let playPromise = mediaEl.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(e => {
                            if (e.name === 'NotAllowedError') {
                                document.getElementById('interaction-overlay').style.display = 'flex';
                            }
                        });
                    }
                } else {
                    mediaEl = document.createElement('img');
                    mediaEl.src = data.url;
                }

                // Força via style inline para que o OBS (CEF browser) não ignore
                mediaEl.style.display = 'block';
                mediaEl.style.maxWidth = '500px';
                mediaEl.style.maxHeight = '500px';
                mediaEl.classList.add('media-content');
            }

            mediaEl.style.pointerEvents = 'none';
            mediaEl.style.userSelect = 'none';

            if (data.opacity !== undefined) {
                mediaEl.style.opacity = data.opacity;
            }

            const cropWrapper = document.createElement('div');
            cropWrapper.classList.add('media-crop-wrapper');
            cropWrapper.style.overflow = 'hidden';
            cropWrapper.style.position = 'relative';

            cropWrapper.appendChild(mediaEl);
            container.appendChild(cropWrapper);
            document.body.appendChild(container);
            
            mediaElements[data.id] = container;
            
            if (mediaEl.tagName === 'IMG') {
                mediaEl.onload = () => applyTransform(data.id);
            } else if (mediaEl.tagName === 'VIDEO') {
                mediaEl.onloadedmetadata = () => applyTransform(data.id);
            }
            applyTransform(data.id);
        }

        // Heartbeat: mantem o admin atualizado com o tempo real do vídeo rodando no OBS
        setInterval(() => {
            Object.keys(mediaElements).forEach(id => {
                const el = mediaElements[id];
                const video = el.querySelector('video');
                if (video && !video.paused) {
                    // Envia para o servidor sincronizar os painéis admin caso o navegador tenha pausado o vídeo lá
                    socket.emit('media:video_sync_from_overlay', { id: id, currentTime: video.currentTime });
                }
            });
        }, 2000);

        // --- TTS Character Logic ---
        const ttsContainer = document.getElementById('tts-character-container');
        const ttsImg = document.getElementById('tts-character-img');
        const ttsSubtitle = document.getElementById('tts-subtitle');
        
        let currentTtsAudio = null;
        let currentSubtitleTimeout = null;

        socket.on('character:speak', (data) => {
            // Cancela qualquer fala anterior
            window.speechSynthesis.cancel();
            if (currentTtsAudio) {
                currentTtsAudio.pause();
                currentTtsAudio = null;
            }

            // Atualiza imagem
            if (data.imageUrl) {
                ttsImg.src = data.imageUrl;
            } else {
                // Placeholder padrão
                ttsImg.src = "https://cdn-icons-png.flaticon.com/512/4712/4712010.png";
            }

            ttsContainer.style.left = '';
            ttsContainer.style.right = '';
            ttsContainer.style.top = '';
            ttsContainer.style.bottom = '';
            ttsContainer.style.transform = '';

            // Cor da Legenda
            if (data.subtitleColor) {
                document.documentElement.style.setProperty('--tts-active-color', data.subtitleColor);
            }

            // Posição
            if (data.position === 'left') {
                ttsContainer.style.setProperty('--tts-hidden-top', 'auto');
                ttsContainer.style.setProperty('--tts-hidden-bottom', '-400px');
                ttsContainer.style.setProperty('--tts-hidden-left', '20px');
                ttsContainer.style.setProperty('--tts-hidden-right', 'auto');
                ttsContainer.style.setProperty('--tts-hidden-transform', 'none');

                ttsContainer.style.setProperty('--tts-show-top', 'auto');
                ttsContainer.style.setProperty('--tts-show-bottom', '20px');
                ttsContainer.style.setProperty('--tts-show-left', '20px');
                ttsContainer.style.setProperty('--tts-show-right', 'auto');
                ttsContainer.style.setProperty('--tts-show-transform', 'none');
                
                ttsImg.style.transform = 'scaleX(-1)';
            } else if (data.position === 'custom') {
                const cx = data.customX !== undefined ? data.customX : 80;
                const cy = data.customY !== undefined ? data.customY : 80;
                
                ttsContainer.style.setProperty('--tts-hidden-top', '150%');
                ttsContainer.style.setProperty('--tts-hidden-bottom', 'auto');
                ttsContainer.style.setProperty('--tts-hidden-left', cx + '%');
                ttsContainer.style.setProperty('--tts-hidden-right', 'auto');
                ttsContainer.style.setProperty('--tts-hidden-transform', 'translate(-50%, -50%)');

                ttsContainer.style.setProperty('--tts-show-top', cy + '%');
                ttsContainer.style.setProperty('--tts-show-bottom', 'auto');
                ttsContainer.style.setProperty('--tts-show-left', cx + '%');
                ttsContainer.style.setProperty('--tts-show-right', 'auto');
                ttsContainer.style.setProperty('--tts-show-transform', 'translate(-50%, -50%)');
                
                ttsImg.style.transform = data.customFlip ? 'scaleX(-1)' : 'scaleX(1)';
            } else {
                ttsContainer.style.setProperty('--tts-hidden-top', 'auto');
                ttsContainer.style.setProperty('--tts-hidden-bottom', '-400px');
                ttsContainer.style.setProperty('--tts-hidden-left', 'auto');
                ttsContainer.style.setProperty('--tts-hidden-right', '20px');
                ttsContainer.style.setProperty('--tts-hidden-transform', 'none');

                ttsContainer.style.setProperty('--tts-show-top', 'auto');
                ttsContainer.style.setProperty('--tts-show-bottom', '20px');
                ttsContainer.style.setProperty('--tts-show-left', 'auto');
                ttsContainer.style.setProperty('--tts-show-right', '20px');
                ttsContainer.style.setProperty('--tts-show-transform', 'none');

                ttsImg.style.transform = 'scaleX(1)';
            }

            const hasText = !!data.text;
            const hasAudio = !!data.audioUrl;
            const behavior = data.audioBehavior || 'simultaneous'; // simultaneous, audio_only, audio_before, audio_after

            // Animação inicial
            ttsContainer.className = 'tts-character-container'; // clear old classes
            if (data.animation && data.animation !== 'none') {
                if (!hasText) {
                    ttsContainer.classList.add(`anim-${data.animation}-infinite`);
                }
            }

            // Mostra personagem
            ttsContainer.classList.add('show');

            const hideCharacter = () => {
                ttsContainer.classList.remove('show');
                ttsSubtitle.classList.remove('show');
            };

            const speakText = (onFinish) => {
                if (!hasText) {
                    if (onFinish) onFinish();
                    return;
                }
                
                const regex = /\S+/g;
                let match;
                const words = [];
                while ((match = regex.exec(data.text)) !== null) {
                    words.push({
                        text: match[0],
                        startIndex: match.index
                    });
                }

                let currentWordIndex = -1;
                let currentChunkStartIndex = -1;

                const utterance = new SpeechSynthesisUtterance(data.text);
                utterance.lang = 'pt-BR';
                
                utterance.onboundary = (event) => {
                    if (event.name !== 'word') return;
                    
                    let spokenWordIndex = -1;
                    for (let i = words.length - 1; i >= 0; i--) {
                        if (event.charIndex >= words[i].startIndex) {
                            spokenWordIndex = i;
                            break;
                        }
                    }

                    if (spokenWordIndex !== -1 && spokenWordIndex !== currentWordIndex) {
                        currentWordIndex = spokenWordIndex;

                        // Sincroniza a animação
                        if (data.animation && data.animation !== 'none') {
                            ttsContainer.classList.remove(`anim-${data.animation}-sync`);
                            void ttsContainer.offsetWidth; // Force reflow
                            ttsContainer.classList.add(`anim-${data.animation}-sync`);
                        }
                        
                        const chunkStartIndex = Math.floor(spokenWordIndex / 3) * 3;
                        
                        if (chunkStartIndex !== currentChunkStartIndex) {
                            currentChunkStartIndex = chunkStartIndex;
                            ttsSubtitle.innerHTML = '';
                            
                            for (let i = chunkStartIndex; i < chunkStartIndex + 3 && i < words.length; i++) {
                                const span = document.createElement('span');
                                span.innerText = words[i].text + ' ';
                                span.id = 'tts-word-' + i;
                                span.className = 'tts-word-hidden';
                                ttsSubtitle.appendChild(span);
                            }
                        }

                        // Atualiza as classes das palavras do chunk atual
                        for (let i = chunkStartIndex; i < chunkStartIndex + 3 && i < words.length; i++) {
                            const span = document.getElementById('tts-word-' + i);
                            if (span) {
                                if (i < spokenWordIndex) {
                                    span.className = 'tts-word-visible';
                                } else if (i === spokenWordIndex) {
                                    setTimeout(() => {
                                        span.className = 'tts-word-active';
                                    }, 10);
                                } else {
                                    span.className = 'tts-word-hidden';
                                }
                            }
                        }
                    }
                };

                utterance.onend = () => { 
                    ttsSubtitle.innerHTML = '';
                    if (onFinish) onFinish(); 
                };
                utterance.onerror = () => { 
                    ttsSubtitle.innerHTML = '';
                    if (onFinish) onFinish(); 
                };
                window.speechSynthesis.speak(utterance);
            };

            const playAudio = (onFinish) => {
                if (!hasAudio) {
                    if (onFinish) onFinish();
                    return;
                }
                currentTtsAudio = new Audio(data.audioUrl);
                currentTtsAudio.onended = () => {
                    currentTtsAudio = null;
                    if (onFinish) onFinish();
                };
                currentTtsAudio.onerror = () => {
                    currentTtsAudio = null;
                    if (onFinish) onFinish();
                };
                currentTtsAudio.play().catch(e => {
                    console.error("Erro ao tocar áudio do TTS:", e);
                    if (e.name === 'NotAllowedError') {
                        document.getElementById('interaction-overlay').style.display = 'flex';
                    }
                    currentTtsAudio = null;
                    if (onFinish) onFinish();
                });
            };

            if (behavior === 'audio_only' || (!hasText && hasAudio)) {
                playAudio(hideCharacter);
            } else if (!hasAudio) {
                speakText(hideCharacter);
            } else if (behavior === 'audio_before') {
                playAudio(() => {
                    speakText(hideCharacter);
                });
            } else if (behavior === 'audio_after') {
                speakText(() => {
                    playAudio(hideCharacter);
                });
            } else {
                // simultaneous
                let finishedCount = 0;
                const checkDone = () => {
                    finishedCount++;
                    if (finishedCount === 2) hideCharacter();
                };
                speakText(checkDone);
                playAudio(checkDone);
            }
        });

        socket.on('character:stop', () => {
            window.speechSynthesis.cancel();
            if (currentTtsAudio) {
                currentTtsAudio.pause();
                currentTtsAudio = null;
            }
            ttsContainer.classList.remove('show');
            if (ttsSubtitle) ttsSubtitle.classList.remove('show');
        });
    </script>
</body>
</html>
